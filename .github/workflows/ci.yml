name: CI

# Validates the submission constraints that do NOT require the private course data:
#   * strategy.py only uses the allowed top-level imports (the same check the grader runs)
#   * all Python modules compile
# The full self-evaluation (python evaluation.py) needs the course data/ folder and is
# run locally, not in CI.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn scipy pyyaml joblib

      - name: Byte-compile sources
        run: python -m py_compile strategy.py experiments.py analysis.py

      - name: Validate allowed imports in strategy.py
        run: python -c "import evaluation; evaluation.check_imports(); print('Import check OK')"
